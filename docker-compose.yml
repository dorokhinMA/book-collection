services:
  bookshelf:
    build: .
    container_name: bookshelf
    ports:
      - "3000:3000"
    volumes:
      - bookshelf_data:/data   # SQLite database persisted here
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_PATH: /data/books.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e",
        "require('http').get('http://localhost:3000/', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  bookshelf_data:
    driver: local
